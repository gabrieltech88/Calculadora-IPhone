<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/calculadora.css">
    <title>Calculadora IPhone</title>
</head>
<body>
    <main>
        <h1>Calculadora <span>IP</span>hone</h1>
        <br>
        <div id="container-saida">
            <output id="saida">
                Resultado
            </output>
        </div>
        <div id="container-listas">
            <div id="container-lista">
                <ul id="lista-numeros">
                    <li class=" item-lista-numeros item1">
                        <button class="btn-numero btn" value="9">9</button>
                    </li>
                    <li class=" item-lista-numeros item2">
                        <button class="btn-numero btn" value="8">8</button>
                    </li>
                    <li class=" item-lista-numeros item3">
                        <button class="btn-numero btn" value="7">7</button>
                    </li>
                    <li class=" item-lista-numeros item4">
                        <button class="btn-numero btn" value="6">6</button>
                    </li>
                    <li class=" item-lista-numeros item5">
                        <button class="btn-numero btn" value="5">5</button>
                    </li>
                    <li class=" item-lista-numeros item6">
                        <button class="btn-numero btn" value="4">4</button>
                    </li>
                    <li class=" item-lista-numeros item7">
                        <button class="btn-numero btn" value="3">3</button>
                    </li>
                    <li class=" item-lista-numeros item8">
                        <button class="btn-numero btn" value="2">2</button>
                    </li>
                    <li class=" item-lista-numeros item9">
                        <button class="btn-numero btn" value="1">1</button>
                    </li>
                    <li class=" item-lista-numeros item10">
                        <button class="btn-numero btn" value="0">0</button>
                    </li>
                </ul>
            </div>
            <div id="container-lista-op">
                <ul id="lista-op">
                    <li class="item-lista-op">
                        <button class="btn-op btn">=</button>
                    </li>
                    <li class="item-lista-op">
                        <button class="btn-op btn">+</button>
                    </li>
                    <li class="item-lista-op">
                        <button class="btn-op btn">-</button>
                    </li>
                    <li class="item-lista-op">
                        <button class="btn-op btn">x</button>
                    </li>
                    <li class="item-lista-op">
                        <button class="btn-op btn">/</button>
                    </li>
                </ul>
            </div>
        </div>
    </main>
</body>
</html>
